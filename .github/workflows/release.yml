name: Release

# Trigger by pushing a version tag: git tag v1.9.2 && git push origin v1.9.2
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/grimoire

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Parse v1.9.2 → major=1, minor=1.9, patch=1.9.2
      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.9.2
          VERSION="${TAG#v}"                 # e.g. 1.9.2
          MAJOR="${VERSION%%.*}"             # e.g. 1
          MINOR="${VERSION%.*}"              # e.g. 1.9
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"       >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"       >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            COMMIT_HASH=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.major }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.minor }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
