# Grimoire + Filebrowser Quantum
#
# Filebrowser Quantum provides a browser-based file manager for uploading and
# organizing your library files. Grimoire mounts the library read-only;
# Filebrowser mounts it read-write.
#
# Usage:
#   docker compose -f docs/docker/docker-compose.filebrowser.yml up -d
#
# After adding files, trigger a rescan in Grimoire:
#   Sidebar → Rescan, or Settings → Maintenance → Rescan Library

services:
  grimoire:
    image: hunterreadca/grimoire:latest
    container_name: grimoire
    restart: unless-stopped
    ports:
      - "9481:9481"
    environment:
      - LIBRARY_PATH=/library
      - DATA_PATH=/data
      - WORKERS=2
      # Required — generate with: openssl rand -hex 32
      - SECRET_KEY=change-me
    volumes:
      # Grimoire never modifies your files — read-only is safe and recommended
      - /path/to/your/library:/library:ro
      - /path/to/grimoire/data:/data
    networks:
      - grimoire

  filebrowser:
    image: gtsteffaniak/filebrowser:latest
    container_name: grimoire-filebrowser
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FB_ROOT=/srv
      - FB_DATABASE=/database/filebrowser.db
      - FB_ADDRESS=0.0.0.0
      - FB_PORT=8080
    volumes:
      # Read-write so Filebrowser can upload, rename, and delete files
      - /path/to/your/library:/srv
      - filebrowser_data:/database
    networks:
      - grimoire

volumes:
  filebrowser_data:

networks:
  grimoire:
